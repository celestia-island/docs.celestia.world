[book]
title = "celestia-island 문서"
description = "celestia-island 생태계의 중앙 문서 및 블로그 허브"
authors = ["celestia-island"]
language = "ko"
src = "."

[build]
build-dir = "../../target/docs/ko"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/celestia-island/docs.celestia.world"
edit-url-template = "https://github.com/celestia-island/docs.celestia.world/edit/main/docs/ko/{path}"
additional-js = ["../theme/lang-switcher.js"]
additional-css = ["../theme/lang-switcher.css"]

[book]
title = "celestia-island 文件"
description = "celestia-island 生態的集中式文件與部落格中心"
authors = ["celestia-island"]
language = "zh-TW"
src = "."

[build]
build-dir = "../../target/docs/zht"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/celestia-island/docs.celestia.world"
edit-url-template = "https://github.com/celestia-island/docs.celestia.world/edit/main/docs/zht/{path}"
additional-js = ["../theme/lang-switcher.js"]
additional-css = ["../theme/lang-switcher.css"]

[book]
title = "Документация celestia-island"
description = "Централизованный центр документации и блога для экосистемы celestia-island"
authors = ["celestia-island"]
language = "ru"
src = "."

[build]
build-dir = "../../target/docs/ru"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/celestia-island/docs.celestia.world"
edit-url-template = "https://github.com/celestia-island/docs.celestia.world/edit/main/docs/ru/{path}"
additional-js = ["../theme/lang-switcher.js"]
additional-css = ["../theme/lang-switcher.css"]

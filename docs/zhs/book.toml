[book]
title = "celestia-island 文档"
description = "celestia-island 生态的集中式文档与博客中心"
authors = ["celestia-island"]
language = "zh-CN"
src = "."

[build]
build-dir = "../../target/docs/zhs"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/celestia-island/docs.celestia.world"
edit-url-template = "https://github.com/celestia-island/docs.celestia.world/edit/main/docs/zhs/{path}"
additional-js = ["../theme/lang-switcher.js"]
additional-css = ["../theme/lang-switcher.css"]

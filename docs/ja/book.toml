[book]
title = "celestia-island ドキュメント"
description = "celestia-island エコシステムの統合ドキュメント・ブログハブ"
authors = ["celestia-island"]
language = "ja"
src = "."

[build]
build-dir = "../../target/docs/ja"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/celestia-island/docs.celestia.world"
edit-url-template = "https://github.com/celestia-island/docs.celestia.world/edit/main/docs/ja/{path}"
additional-js = ["../theme/lang-switcher.js"]
additional-css = ["../theme/lang-switcher.css"]
